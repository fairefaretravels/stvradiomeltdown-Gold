<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1a1500" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="STV Gold" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STV Radiomeltdown — Now Playing</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #0e0e0f;
      --gold:   #c8a96e;
      --red:    #c0392b;
      --dim:    #1a1a1b;
      --mid:    #2a2a2b;
      --text:   #e8e0d0;
      --muted:  #7a7060;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      letter-spacing: 0.02em;
    }

    /* ── WIDGET SHELL ─────────────────────────────── */
    .player {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      margin: 0 auto;
      background: var(--black);
      border: 1px solid #222;
    }

    /* ── HEADER ───────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 10px;
      border-bottom: 1px solid #222;
      background: var(--dim);
    }
    .brand {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }
    .brand-eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--gold);
      text-transform: uppercase;
    }
    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 0.06em;
      color: var(--text);
      line-height: 1;
    }
    .live-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--red);
      text-transform: uppercase;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    /* ── NOW PLAYING ──────────────────────────────── */
    .now-playing {
      padding: 18px 16px 14px;
      background: var(--dim);
      border-bottom: 1px solid #1e1e1e;
    }
    .np-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .np-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.04em;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .np-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      letter-spacing: 0.06em;
    }

    /* ── WAVEFORM / VISUALIZER ────────────────────── */
    .viz-bar {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 32px;
      padding: 8px 16px 0;
    }
    .viz-bar span {
      flex: 1;
      background: var(--gold);
      border-radius: 1px 1px 0 0;
      opacity: 0.45;
      transition: height 0.1s;
    }
    body.playing .viz-bar span {
      animation: bar var(--dur, 0.7s) ease-in-out infinite alternate;
      opacity: 0.8;
    }
    @keyframes bar { from { transform: scaleY(0.15); } to { transform: scaleY(1); } }

    /* ── PROGRESS ─────────────────────────────────── */
    .progress-wrap {
      padding: 6px 16px 0;
    }
    .progress-track {
      width: 100%;
      height: 3px;
      background: var(--mid);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      background: var(--gold);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s linear;
      pointer-events: none;
    }
    input[type=range].scrub {
      position: absolute;
      inset: -6px 0;
      width: 100%;
      height: 16px;
      opacity: 0;
      cursor: pointer;
      margin: 0;
    }
    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-top: 5px;
    }

    /* ── CONTROLS ─────────────────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 14px 16px 10px;
    }
    .btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, transform 0.1s;
      padding: 4px;
    }
    .btn:hover { color: var(--gold); transform: scale(1.1); }
    .btn:active { transform: scale(0.95); }
    .btn.active { color: var(--gold); }
    .btn-play {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--gold);
      color: var(--black);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      box-shadow: 0 0 0 0 rgba(200,169,110,0.4);
    }
    body.playing .btn-play {
      animation: ring 2.5s ease-out infinite;
    }
    @keyframes ring {
      0%   { box-shadow: 0 0 0 0 rgba(200,169,110,0.5); }
      70%  { box-shadow: 0 0 0 10px rgba(200,169,110,0); }
      100% { box-shadow: 0 0 0 0 rgba(200,169,110,0); }
    }
    .btn-play:hover { background: #d9bc82; transform: scale(1.06); }
    .btn-play:active { transform: scale(0.97); }

    /* ── VOLUME ───────────────────────────────────── */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px 12px;
    }
    .vol-icon { color: var(--muted); font-size: 13px; }
    input[type=range].vol {
      flex: 1;
      height: 3px;
      accent-color: var(--gold);
      cursor: pointer;
    }
    .vol-pct {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      min-width: 28px;
      text-align: right;
    }

    /* ── PLAYLIST ─────────────────────────────────── */
    .playlist-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px 8px;
      border-top: 1px solid #1e1e1e;
      border-bottom: 1px solid #1e1e1e;
      background: var(--dim);
    }
    .pl-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
    }
    .pl-count {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    .playlist {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--mid) transparent;
    }
    .pl-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      cursor: pointer;
      border-bottom: 1px solid #161616;
      transition: background 0.1s;
    }
    .pl-item:hover { background: var(--dim); }
    .pl-item.active { background: #16140f; }
    .pl-num {
      font-size: 10px;
      color: var(--muted);
      min-width: 18px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .pl-item.active .pl-num { color: var(--gold); }
    .pl-name {
      flex: 1;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .pl-item.active .pl-name { color: var(--gold); font-weight: 600; }
    .pl-playing-icon {
      font-size: 9px;
      color: var(--gold);
      opacity: 0;
    }
    .pl-item.active .pl-playing-icon { opacity: 1; }

    /* ── FOOTER ───────────────────────────────────── */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--dim);
    }
    .footer-links {
      display: flex;
      gap: 12px;
    }
    .footer-links a {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .footer-links a:hover { color: var(--gold); }
    .footer-tag {
      font-size: 9px;
      color: #333;
      letter-spacing: 0.1em;
    }

    /* ── LOADING / ERROR STATES ───────────────────── */
    .status-msg {
      padding: 24px 16px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }
    .status-msg.error { color: var(--red); }

    /* ── EMBED HINT (hidden in full page) ─────────── */
    .embed-hint { display: none; }
  </style>
</head>
<body>

<div class="player">

  <!-- HEADER -->
  <div class="header">
    <div class="brand">
      <span class="brand-eyebrow">G4E Movement Studio</span>
      <span class="brand-name">STV Radiomeltdown</span>
    </div>
    <div class="live-dot">
      <div class="dot"></div>
      Live
    </div>
  </div>

  <!-- NOW PLAYING -->
  <div class="now-playing">
    <div class="np-label">Now Playing</div>
    <div class="np-title" id="np-title">Loading…</div>
    <div class="np-meta" id="np-meta">STV Radiomeltdown · Lithonia, GA</div>
  </div>

  <!-- VISUALIZER BARS -->
  <div class="viz-bar" id="viz-bar">
    <!-- bars injected by JS -->
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-track" id="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
      <input type="range" class="scrub" id="scrub" min="0" max="100" value="0" step="0.1" />
    </div>
    <div class="time-row">
      <span id="time-cur">0:00</span>
      <span id="time-dur">0:00</span>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="btn" id="btn-shuffle" title="Shuffle" aria-label="Shuffle">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
        <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
      </svg>
    </button>
    <button class="btn" id="btn-prev" title="Previous" aria-label="Previous">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="19,20 9,12 19,4"/><rect x="5" y="4" width="2" height="16"/>
      </svg>
    </button>
    <button class="btn-play" id="btn-play" title="Play/Pause" aria-label="Play">
      <svg id="play-icon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
      <svg id="pause-icon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    </button>
    <button class="btn" id="btn-next" title="Next" aria-label="Next">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="5,4 15,12 5,20"/><rect x="17" y="4" width="2" height="16"/>
      </svg>
    </button>
    <button class="btn active" id="btn-repeat" title="Repeat" aria-label="Repeat">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
        <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
      </svg>
    </button>
  </div>

  <!-- VOLUME -->
  <div class="volume-row">
    <span class="vol-icon">🔇</span>
    <input type="range" class="vol" id="vol" min="0" max="100" value="80" />
    <span class="vol-pct" id="vol-pct">80%</span>
  </div>

  <!-- PLAYLIST -->
  <div class="playlist-header">
    <span class="pl-label">Playlist — <span id="pl-mode">Shuffled</span></span>
    <span class="pl-count" id="pl-count">Loading…</span>
  </div>
  <div class="playlist" id="playlist">
    <div class="status-msg" id="pl-status">Scanning station…</div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-links">
      <a href="https://kick.com/STVNETWORK" target="_blank" rel="noopener">Kick</a>
      <a href="https://www.youtube.com/@STVRADIOMELTDOWN" target="_blank" rel="noopener">YouTube</a>
      <a href="https://fairefaretravels.github.io/radiomeltdownorg/" target="_blank" rel="noopener">radiomeltdown.com</a>
      <a href="https://www.tiktok.com/@sanecatv" target="_blank" rel="noopener">@SanecaTV</a>
    </div>
    <span class="footer-tag">STV</span>
  </div>

</div>

<!-- HIDDEN AUDIO -->
<audio id="audio" preload="metadata" crossorigin="anonymous"></audio>

<script>
  // ── CONFIG ────────────────────────────────────────────────────────────────
  const REPO_OWNER  = 'fairefaretravels';
  const REPO_NAME   = 'radiomeltdownorg';
  const RAW_BASE    = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/`;
  const API_URL     = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/`;
  const AUDIO_EXTS  = ['.mp3', '.ogg', '.wav', '.flac', '.m4a', '.aac'];

  // ── STATE ─────────────────────────────────────────────────────────────────
  let tracks      = [];   // [{name, url}] original order
  let queue       = [];   // [{name, url}] current play order
  let currentIdx  = 0;
  let shuffleOn   = true;
  let repeatOn    = true;
  let loaded      = false;

  // ── DOM ───────────────────────────────────────────────────────────────────
  const audio       = document.getElementById('audio');
  const npTitle     = document.getElementById('np-title');
  const npMeta      = document.getElementById('np-meta');
  const progressFill= document.getElementById('progress-fill');
  const scrub       = document.getElementById('scrub');
  const timeCur     = document.getElementById('time-cur');
  const timeDur     = document.getElementById('time-dur');
  const btnPlay     = document.getElementById('btn-play');
  const playIcon    = document.getElementById('play-icon');
  const pauseIcon   = document.getElementById('pause-icon');
  const btnPrev     = document.getElementById('btn-prev');
  const btnNext     = document.getElementById('btn-next');
  const btnShuffle  = document.getElementById('btn-shuffle');
  const btnRepeat   = document.getElementById('btn-repeat');
  const volSlider   = document.getElementById('vol');
  const volPct      = document.getElementById('vol-pct');
  const plContainer = document.getElementById('playlist');
  const plStatus    = document.getElementById('pl-status');
  const plCount     = document.getElementById('pl-count');
  const plMode      = document.getElementById('pl-mode');
  const vizBar      = document.getElementById('viz-bar');

  // ── VIZ BARS ──────────────────────────────────────────────────────────────
  (function buildViz() {
    for (let i = 0; i < 28; i++) {
      const s = document.createElement('span');
      const h = 8 + Math.random() * 24;
      s.style.height = h + 'px';
      s.style.setProperty('--dur', (0.4 + Math.random() * 0.7).toFixed(2) + 's');
      s.style.animationDelay = (Math.random() * 0.5).toFixed(2) + 's';
      vizBar.appendChild(s);
    }
  })();

  // ── FETCH PLAYLIST ────────────────────────────────────────────────────────
  async function loadPlaylist() {
    try {
      const res = await fetch(API_URL, {
        headers: { 'Accept': 'application/vnd.github+json' }
      });
      if (!res.ok) throw new Error(`GitHub API ${res.status}`);
      const files = await res.json();

      tracks = files
        .filter(f => f.type === 'file' && AUDIO_EXTS.some(ext => f.name.toLowerCase().endsWith(ext)))
        .map(f => ({
          name: f.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase()),
          url:  RAW_BASE + encodeURIComponent(f.name)
        }));

      if (tracks.length === 0) {
        plStatus.textContent = 'No audio files found in repo root.';
        plStatus.classList.add('error');
        return;
      }

      queue = shuffleOn ? shuffle([...tracks]) : [...tracks];
      plStatus.remove();
      renderPlaylist();
      plCount.textContent = `${tracks.length} track${tracks.length !== 1 ? 's' : ''}`;
      loadTrack(0, false); // load first, don't autoplay yet
      loaded = true;
    } catch (err) {
      console.error(err);
      plStatus.textContent = `Couldn't load playlist: ${err.message}`;
      plStatus.classList.add('error');
      plCount.textContent = '—';
    }
  }

  // ── SHUFFLE ───────────────────────────────────────────────────────────────
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // ── RENDER PLAYLIST ───────────────────────────────────────────────────────
  function renderPlaylist() {
    plContainer.innerHTML = '';
    queue.forEach((t, i) => {
      const item = document.createElement('div');
      item.className = 'pl-item' + (i === currentIdx ? ' active' : '');
      item.dataset.idx = i;
      item.innerHTML = `
        <span class="pl-num">${String(i + 1).padStart(2, '0')}</span>
        <span class="pl-name">${t.name}</span>
        <span class="pl-playing-icon">▶</span>
      `;
      item.addEventListener('click', () => { loadTrack(i, true); });
      plContainer.appendChild(item);
    });
  }

  function updateActiveItem() {
    plContainer.querySelectorAll('.pl-item').forEach((el, i) => {
      el.classList.toggle('active', i === currentIdx);
    });
    // scroll active into view
    const active = plContainer.querySelector('.pl-item.active');
    if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  // ── LOAD TRACK ────────────────────────────────────────────────────────────
  function loadTrack(idx, autoplay = true) {
    currentIdx = idx;
    const t = queue[idx];
    audio.src = t.url;
    npTitle.textContent = t.name;
    npMeta.textContent  = `STV Radiomeltdown · Track ${idx + 1} of ${queue.length}`;
    updateActiveItem();
    progressFill.style.width = '0%';
    scrub.value = 0;
    timeCur.textContent = '0:00';
    timeDur.textContent = '0:00';
    if (autoplay) {
      audio.play().catch(() => {});
    } else {
      audio.load();
    }
  }

  // ── PLAYBACK STATE ────────────────────────────────────────────────────────
  function setPlaying(yes) {
    document.body.classList.toggle('playing', yes);
    playIcon.style.display  = yes ? 'none'  : '';
    pauseIcon.style.display = yes ? ''      : 'none';
  }

  audio.addEventListener('play',  () => setPlaying(true));
  audio.addEventListener('pause', () => setPlaying(false));
  audio.addEventListener('ended', () => {
    if (repeatOn) {
      const next = (currentIdx + 1) % queue.length;
      loadTrack(next, true);
    } else if (currentIdx < queue.length - 1) {
      loadTrack(currentIdx + 1, true);
    } else {
      setPlaying(false);
    }
  });

  // ── PROGRESS ─────────────────────────────────────────────────────────────
  function fmt(s) {
    if (!isFinite(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + '%';
    scrub.value = pct;
    timeCur.textContent = fmt(audio.currentTime);
  });

  audio.addEventListener('loadedmetadata', () => {
    timeDur.textContent = fmt(audio.duration);
  });

  scrub.addEventListener('input', () => {
    if (audio.duration) {
      audio.currentTime = (scrub.value / 100) * audio.duration;
    }
  });

  // ── VOLUME ───────────────────────────────────────────────────────────────
  audio.volume = 0.8;
  volSlider.addEventListener('input', () => {
    audio.volume = volSlider.value / 100;
    volPct.textContent = volSlider.value + '%';
  });

  // ── BUTTONS ───────────────────────────────────────────────────────────────
  btnPlay.addEventListener('click', () => {
    if (!loaded) return;
    audio.paused ? audio.play().catch(() => {}) : audio.pause();
  });

  btnPrev.addEventListener('click', () => {
    if (!loaded) return;
    if (audio.currentTime > 3) { audio.currentTime = 0; return; }
    const prev = (currentIdx - 1 + queue.length) % queue.length;
    loadTrack(prev, true);
  });

  btnNext.addEventListener('click', () => {
    if (!loaded) return;
    loadTrack((currentIdx + 1) % queue.length, true);
  });

  btnShuffle.addEventListener('click', () => {
    shuffleOn = !shuffleOn;
    btnShuffle.classList.toggle('active', shuffleOn);
    plMode.textContent = shuffleOn ? 'Shuffled' : 'In Order';
    const currentTrack = queue[currentIdx];
    queue = shuffleOn ? shuffle([...tracks]) : [...tracks];
    currentIdx = queue.findIndex(t => t.url === currentTrack.url);
    if (currentIdx < 0) currentIdx = 0;
    renderPlaylist();
    updateActiveItem();
  });

  btnRepeat.addEventListener('click', () => {
    repeatOn = !repeatOn;
    btnRepeat.classList.toggle('active', repeatOn);
  });

  // ── INIT ──────────────────────────────────────────────────────────────────
  loadPlaylist();
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
